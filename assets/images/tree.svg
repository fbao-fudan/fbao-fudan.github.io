<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <!--
    Dragon Blood Tree (Dracaena cinnabari) silhouette.
    Wide, flat umbrella canopy on a short candelabra trunk —
    endemic to Socotra Island.

    All shapes share a single <g opacity> so overlapping fills
    merge into one clean, joint-free silhouette.
  -->

  <g fill="white" opacity="0.24">

    <!-- ══════════════════════════════════════════════════════
         CANOPY — the dominant shape.
         Very wide (364 px) and relatively flat (210 px tall),
         giving the characteristic mushroom-parasol profile.
    ═══════════════════════════════════════════════════════════ -->
    <path d="
      M 200 32
      C 294 32 372 90 386 162
      C 396 206 374 238 336 243
      C 291 249 247 252 200 252
      C 153 252 109 249 64 243
      C 26 238 4 206 14 162
      C 28 90 106 32 200 32 Z
    "/>

    <!-- ══════════════════════════════════════════════════════
         TRUNK — short, stout column
    ═══════════════════════════════════════════════════════════ -->
    <path d="M 189 336 L 211 336 L 213 468 L 187 468 Z"/>

    <!-- Root flares -->
    <path d="M 188 455 Q 162 466 144 476 L 140 468 Q 158 460 187 450 Z"/>
    <path d="M 212 455 Q 238 466 256 476 L 260 468 Q 242 460 213 450 Z"/>

    <!-- ══════════════════════════════════════════════════════
         LEVEL-1 BRANCHES — trunk forks into two main boughs
         Each drawn as a tapered filled quadrilateral.
    ═══════════════════════════════════════════════════════════ -->

    <!-- Left bough: trunk (200, 342) → canopy base (124, 250) -->
    <path d="M 186 362 L 202 346 L 132 248 L 115 256 Z"/>

    <!-- Right bough: trunk (200, 342) → canopy base (276, 250) -->
    <path d="M 214 362 L 198 346 L 268 248 L 285 256 Z"/>

    <!-- ══════════════════════════════════════════════════════
         LEVEL-2 BRANCHES — each bough forks again near canopy
    ═══════════════════════════════════════════════════════════ -->

    <!-- Left bough forks at ~(158, 302) -->
    <!-- Far-left sub → (62, 246) -->
    <path d="M 148 308 L 164 296 L 72 245 L 56 253 Z"/>
    <!-- Centre-left sub → (172, 244) -->
    <path d="M 164 296 L 158 285 L 172 243 L 180 252 Z"/>

    <!-- Right bough forks at ~(242, 302) -->
    <!-- Centre-right sub → (228, 244) -->
    <path d="M 236 296 L 242 285 L 228 243 L 220 252 Z"/>
    <!-- Far-right sub → (338, 246) -->
    <path d="M 252 308 L 236 296 L 328 245 L 344 253 Z"/>

  </g>
</svg>
