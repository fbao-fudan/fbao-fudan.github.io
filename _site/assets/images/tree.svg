<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!--
    Dragon Blood Tree (Dracaena cinnabari) silhouette.
    Characteristic flat umbrella crown, forking branch
    candelabra, and stout trunk — endemic to Socotra Island.
  -->

  <!-- ══ TRUNK ══════════════════════════════════ -->
  <path d="M 185 460 L 187 308 L 213 306 L 215 460 Z"
        fill="white" opacity="0.55"/>

  <!-- Root flares -->
  <path d="M 187 452 Q 160 460 128 470"
        stroke="white" stroke-width="5" fill="none"
        opacity="0.28" stroke-linecap="round"/>
  <path d="M 213 452 Q 240 460 272 470"
        stroke="white" stroke-width="5" fill="none"
        opacity="0.28" stroke-linecap="round"/>

  <!-- ══ BRANCH CANDELABRA ═══════════════════════
       Trunk → main fork → secondary forks → tertiary →
       tips that disappear into the flat canopy dome.
  ════════════════════════════════════════════════ -->

  <!-- Main fork (trunk splits into 2) -->
  <path d="M 198 308 Q 174 288 148 265"
        stroke="white" stroke-width="15" opacity="0.48"
        fill="none" stroke-linecap="round"/>
  <path d="M 202 306 Q 228 286 254 263"
        stroke="white" stroke-width="15" opacity="0.48"
        fill="none" stroke-linecap="round"/>

  <!-- Left secondary fork -->
  <path d="M 148 265 Q 118 244  92 220"
        stroke="white" stroke-width="10" opacity="0.40"
        fill="none" stroke-linecap="round"/>
  <path d="M 148 265 Q 148 238 154 212"
        stroke="white" stroke-width="10" opacity="0.40"
        fill="none" stroke-linecap="round"/>

  <!-- Right secondary fork -->
  <path d="M 254 263 Q 252 236 246 210"
        stroke="white" stroke-width="10" opacity="0.40"
        fill="none" stroke-linecap="round"/>
  <path d="M 254 263 Q 282 242 308 218"
        stroke="white" stroke-width="10" opacity="0.40"
        fill="none" stroke-linecap="round"/>

  <!-- Tertiary — far left -->
  <path d="M  92 220 Q  68 200  52 174"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>
  <path d="M  92 220 Q  96 194 108 170"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>

  <!-- Tertiary — centre-left -->
  <path d="M 154 212 Q 140 186 144 160"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>
  <path d="M 154 212 Q 168 188 174 162"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>

  <!-- Tertiary — centre-right -->
  <path d="M 246 210 Q 228 186 226 160"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>
  <path d="M 246 210 Q 256 186 258 160"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>

  <!-- Tertiary — far right -->
  <path d="M 308 218 Q 304 192 292 168"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>
  <path d="M 308 218 Q 330 198 348 172"
        stroke="white" stroke-width="6" opacity="0.32"
        fill="none" stroke-linecap="round"/>

  <!-- ══ CROWN — wide flat umbrella dome ════════
       Much wider than tall: ~370 px wide, ~175 px tall.
       The defining shape of a dragon blood tree.
  ════════════════════════════════════════════════ -->
  <path d="
    M 200 208

    C 228 207 264 200 298 186
    C 332 172 360 150 374 122
    C 386  96 380  68 362  50
    C 344  32 318  20 290  16
    C 270  12 250   6 232   6
    C 220   4 210   2 200   2
    C 190   2 180   4 168   6
    C 150   6 130  12 110  16
    C  82  20  56  32  38  50
    C  20  68  14  96  26 122
    C  40 150  68 172 102 186
    C 136 200 172 207 200 208 Z
  " fill="white" opacity="0.20"/>

</svg>
